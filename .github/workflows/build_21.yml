name: Build for all 1.21.x

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21.10"
            fabric_api: "0.138.4+1.21.10"
            yarn: "1.21.10+build.3"
            voicechat_api: "2.6.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build for Minecraft ${{ matrix.mc }}
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Pfabric_api_version=${{ matrix.fabric_api }} \
            -Pvoicechat_api_version=${{ matrix.voicechat_api }} \
            --stacktrace
        continue-on-error: true

      - name: Upload artifacts - ${{ matrix.mc }}
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMouth-${{ matrix.mc }}
          path: build/libs/*.jar
          if-no-files-found: warn
