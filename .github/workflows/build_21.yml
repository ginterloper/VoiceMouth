name: Build for all 1.21.x

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21"
            fabric_api: "0.102.0+1.21"
            yarn: "1.21+build.2"
          - mc: "1.21.1"
            fabric_api: "0.116.10+1.21.1"
            yarn: "1.21.1+build.3"
          - mc: "1.21.2"
            fabric_api: "0.118.0+1.21.2"
            yarn: "1.21.2+build.1"
            voicechat: "2.5.24"
          - mc: "1.21.3"
            fabric_api: "0.119.2+1.21.3"
            yarn: "1.21.3+build.2"
            voicechat: "2.5.31"
          - mc: "1.21.4"
            fabric_api: "0.121.0+1.21.4"   # пример, проверь актуальную
            yarn: "1.21.4+build.4"
          - mc: "1.21.5"
            fabric_api: "0.123.0+1.21.5"
            yarn: "1.21.5+build.1"
            voicechat: "2.5.34"
          - mc: "1.21.6"
            fabric_api: "0.125.0+1.21.6"
            yarn: "1.21.6+build.1"
            voicechat: "2.5.32"
          - mc: "1.21.7"
            fabric_api: "0.129.0+1.21.7"
            yarn: "1.21.7+build.1"
            voicechat: "2.5.34"
          - mc: "1.21.8"
            fabric_api: "0.133.3+1.21.8"
            yarn: "1.21.8+build.1"
          - mc: "1.21.9"
            fabric_api: "0.134.1+1.21.9"
            yarn: "1.21.9+build.1"
            voicechat: "2.6.4"
          - mc: "1.21.10"
            fabric_api: "0.138.4+1.21.10"
            yarn: "1.21.10+build.3"
          - mc: "1.21.11"
            fabric_api: "0.141.3+1.21.11"
            yarn: "1.21.11+build.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build for Minecraft ${{ matrix.mc }}
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Pfabric_api_version=${{ matrix.fabric_api }} \
            --stacktrace

      - name: Upload artifacts - ${{ matrix.mc }}
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMouth-${{ matrix.mc }}
          path: build/libs/*.jar
          if-no-files-found: warn
