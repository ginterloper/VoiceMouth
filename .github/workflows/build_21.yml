name: Build for all 1.21.x versions

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false          # Продолжать сборку даже если одна версия упадёт
      matrix:
        minecraft_version: [
          "1.21",
          "1.21.1",
          "1.21.2",
          "1.21.3",
          "1.21.4",
          "1.21.5",
          "1.21.6",
          "1.21.7",
          "1.21.8",
          "1.21.9",
          "1.21.10",
          "1.21.11"
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'           # Рекомендуется именно 21 для 1.21.x
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build for Minecraft ${{ matrix.minecraft_version }}
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.minecraft_version }} \
            -Pyarn_mappings=${{ matrix.minecraft_version }}+build.1 \
            -Pfabric_api_version=0.107.0+${{ matrix.minecraft_version }} \   # будет обновляться автоматически
            --stacktrace

      - name: Upload artifacts for ${{ matrix.minecraft_version }}
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMouth-${{ matrix.minecraft_version }}
          path: build/libs/*.jar
          if-no-files-found: warn